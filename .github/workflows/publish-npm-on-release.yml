name: Release on Version Tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NODE_VERSION: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_NOTES_FILE="docs/releases/RELEASE_NOTES_${VERSION}.md"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=${RELEASE_NOTES_FILE}" >> "$GITHUB_OUTPUT"
          echo "version: ${VERSION}"
          echo "release notes file: ${RELEASE_NOTES_FILE}"

      - name: Validate release metadata
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.version }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          RELEASE_NOTES_FILE="${{ steps.meta.outputs.release_notes_file }}"

          echo "release tag: $TAG"
          echo "package.json version: $PKG_VERSION"
          echo "package name: $PKG_NAME"

          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Release tag does not match package.json version"
            exit 1
          fi

          if [ "$PKG_NAME" != "evalanche" ]; then
            echo "Unexpected package name: $PKG_NAME"
            exit 1
          fi

          if [ ! -f "$RELEASE_NOTES_FILE" ]; then
            echo "Missing release notes file: $RELEASE_NOTES_FILE"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Capture production audit snapshot
        shell: bash
        run: |
          npm audit --omit=dev --json > audit-report.json || true

      - name: Refresh release docs
        run: npm run refresh:release-docs -- --version "${{ steps.meta.outputs.version }}" --release-notes "${{ steps.meta.outputs.release_notes_file }}" --audit-file audit-report.json

      - name: Capture release docs patch
        id: docs_patch
        shell: bash
        run: |
          DOC_FILES=(README.md ROADMAP.md RELEASING.md SECURITY.md VULN_NOTES.md)
          PATCH_FILE="$RUNNER_TEMP/release-docs.patch"

          if git diff --quiet -- "${DOC_FILES[@]}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "patch_file=" >> "$GITHUB_OUTPUT"
          else
            git diff -- "${DOC_FILES[@]}" > "$PATCH_FILE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "patch_file=$PATCH_FILE" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Validate npm README parity
        shell: bash
        run: |
          PACK_DIR="$RUNNER_TEMP/npm-pack"
          mkdir -p "$PACK_DIR"
          PACK_JSON="$PACK_DIR/pack.json"
          npm pack --json --pack-destination "$PACK_DIR" > "$PACK_JSON"
          TARBALL=$(node -e "const fs=require('fs'); const pack=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(pack[0].filename);" "$PACK_JSON")
          tar -xOf "$PACK_DIR/$TARBALL" package/README.md > "$PACK_DIR/published-README.md"
          cmp -s README.md "$PACK_DIR/published-README.md"

      - name: Push refreshed docs to main
        if: steps.docs_patch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag commit is not contained in origin/main"
            exit 1
          fi

          WORKTREE_DIR="$RUNNER_TEMP/release-docs-main"
          git worktree add -B main "$WORKTREE_DIR" origin/main

          cd "$WORKTREE_DIR"
          git apply --3way "${{ steps.docs_patch.outputs.patch_file }}"

          if git diff --quiet -- README.md ROADMAP.md RELEASING.md SECURITY.md VULN_NOTES.md; then
            echo "No docs changes left to commit on main"
            exit 0
          fi

          git add README.md ROADMAP.md RELEASING.md SECURITY.md VULN_NOTES.md
          git commit -m "docs: refresh release docs for v${{ steps.meta.outputs.version }}"
          git push origin HEAD:main

      - name: Preflight package identity
        run: |
          echo "package: $(node -p "require('./package.json').name")"
          echo "version: $(node -p "require('./package.json').version")"
          npm view evalanche version || true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TITLE="Evalanche v${{ steps.meta.outputs.version }}"
          NOTES_FILE="${{ steps.meta.outputs.release_notes_file }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --registry=https://registry.npmjs.org/

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Authenticate ClawHub CLI
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "Missing CLAWHUB_TOKEN secret"
            exit 1
          fi
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          clawhub whoami

      - name: Publish ClawHub skill
        shell: bash
        run: |
          CHANGELOG="$(cat "${{ steps.meta.outputs.release_notes_file }}")"
          clawhub publish skill \
            --slug evalanche \
            --version "${{ steps.meta.outputs.version }}" \
            --tags latest \
            --changelog "$CHANGELOG"
