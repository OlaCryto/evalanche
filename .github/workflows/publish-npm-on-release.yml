name: Release on Version Tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NODE_VERSION: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_NOTES_FILE="RELEASE_NOTES_${VERSION}.md"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=${RELEASE_NOTES_FILE}" >> "$GITHUB_OUTPUT"
          echo "version: ${VERSION}"
          echo "release notes file: ${RELEASE_NOTES_FILE}"

      - name: Validate release metadata
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.version }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          RELEASE_NOTES_FILE="${{ steps.meta.outputs.release_notes_file }}"

          echo "release tag: $TAG"
          echo "package.json version: $PKG_VERSION"
          echo "package name: $PKG_NAME"

          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Release tag does not match package.json version"
            exit 1
          fi

          if [ "$PKG_NAME" != "evalanche" ]; then
            echo "Unexpected package name: $PKG_NAME"
            exit 1
          fi

          if [ ! -f "$RELEASE_NOTES_FILE" ]; then
            echo "Missing release notes file: $RELEASE_NOTES_FILE"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Preflight package identity
        run: |
          echo "package: $(node -p "require('./package.json').name")"
          echo "version: $(node -p "require('./package.json').version")"
          npm view evalanche version || true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          TITLE="Evalanche v${{ steps.meta.outputs.version }}"
          NOTES_FILE="${{ steps.meta.outputs.release_notes_file }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --registry=https://registry.npmjs.org/

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Authenticate ClawHub CLI
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "Missing CLAWHUB_TOKEN secret"
            exit 1
          fi
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          clawhub whoami

      - name: Publish ClawHub skill
        shell: bash
        run: |
          CHANGELOG="$(cat "${{ steps.meta.outputs.release_notes_file }}")"
          clawhub publish skill \
            --slug evalanche \
            --version "${{ steps.meta.outputs.version }}" \
            --tags latest \
            --changelog "$CHANGELOG"
